<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анимации клеток!</title>

    <meta property="og:title" content="Анимации клеток!">
    <meta property="og:description" content="Решил сделать анимации появления и смерти клеток!.. (Это была ошибка, отнявшая у меня много времени. Жалею ли я? Нет! Это получилось так плавно и красиво...)">
    <meta property="og:image" content="https://zincin.github.io/sim//static/thumbnails/sim1.jpg">
    <meta property="og:type" content="video.other">
    <meta property="og:url" content="https://zincin.github.io/sim//video/sim1/">
    <meta name="twitter:card" content="summary_large_image">

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #0a0b10; --card: #161922; --accent: #4aa9c2; --text: #e0e0e0; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Rubik', sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }
        .player-wrap { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; border: 1px solid #222; background: #000; }
        .info { width: 100%; max-width: 1000px; margin-top: 25px; background: var(--card); padding: 25px; border-radius: 12px; box-sizing: border-box; }
        h1 { margin: 0 0 10px 0; color: var(--accent); font-size: 1.5em; }
        p { line-height: 1.6; opacity: 0.8; margin: 0; }
    </style>
</head>
<body>
    <div class="player-wrap">
        <video-js id="vid" class="vjs-default-skin vjs-big-play-centered" controls preload="auto" width="1000" height="560">
            <source src="videos/sim1/playlist.m3u8" type="application/x-mpegURL">
        </video-js>
    </div>
    <div class="info">
        <h1>Анимации клеток!</h1>
        <p>Решил сделать анимации появления и смерти клеток!.. (Это была ошибка, отнявшая у меня много времени. Жалею ли я? Нет! Это получилось так плавно и красиво...)</p>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://unpkg.com/videojs-contrib-quality-levels@4.1.0/dist/videojs-contrib-quality-levels.min.js"></script>
    <script src="https://unpkg.com/videojs-hls-quality-selector@2.0.0/dist/videojs-hls-quality-selector.min.js"></script>
    <script>
        const player = videojs('vid', {
            html5: { vhs: { overrideNative: true } },
            nativeVideoTracks: false,
            nativeAudioTracks: false,
            nativeTextTracks: false
        });
        player.hlsQualitySelector({ displayCurrentQuality: true });
    </script>
</body>
</html>
