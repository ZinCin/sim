<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="{{ video_data.title }}">
    <meta property="og:description" content="{{ video_data.description }}">
    <meta property="og:image" content="{{ request.host_url }}static/thumbnails/{{ video_id }}.jpg">
    <meta property="og:type" content="video.other">
    <meta property="og:url" content="{{ request.url }}">
    <meta name="twitter:card" content="summary_large_image">

    <title>{{ video_data.title }}</title>

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { 
            font-family: sans-serif; background: #121212; color: #fff; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
        }
        .video-container { width: 100%; max-width: 800px; border-radius: 8px; overflow: hidden; }
        .description { 
            margin-top: 20px; padding: 20px; background: #1e1e1e; 
            border-radius: 8px; width: 100%; max-width: 800px; box-sizing: border-box; 
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video-js id="my-video" class="vjs-default-skin vjs-big-play-centered" controls preload="auto" width="800" height="450" poster="/static/thumbnails/{{ video_id }}.jpg">
            <source src="/videos/{{ video_id }}/playlist.m3u8" type="application/x-mpegURL">
        </video-js>
    </div>

    <div class="description">
        <h2>{{ video_data.title }}</h2>
        <p>{{ video_data.description }}</p>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://unpkg.com/videojs-contrib-quality-levels@4.1.0/dist/videojs-contrib-quality-levels.min.js"></script>
    <script src="https://unpkg.com/videojs-hls-quality-selector@2.0.0/dist/videojs-hls-quality-selector.min.js"></script>
    <script>
        // initialize GUI
        var player = videojs('my-video');
        player.hlsQualitySelector({
            displayCurrentQuality: true,
        });
    </script>
</body>
</html>
