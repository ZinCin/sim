<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(145deg, #f8f9fa 0%, #e9ecef 100%);
            color: #212529;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 8rem;
            font-weight: 700;
            margin: 0;
            line-height: 1;
            color: #dc3545;
            text-shadow: 4px 4px 0 rgba(220, 53, 69, 0.2);
        }

        h2 {
            font-size: 2rem;
            font-weight: 500;
            margin: 0 0 1rem 0;
            color: #343a40;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #6c757d;
        }

        .button {
            display: inline-block;
            padding: 0.8rem 2rem;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            border-radius: 40px;
            transition: all 0.2s ease;
            box-shadow: 0 8px 16px rgba(0, 123, 255, 0.3);
        }

        .button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(0, 123, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Файл не найден</h2>
        <p>Извините, данное видео недоступно. Проверьте корректность ссылки</p>
        <a href="/" class="button">Вернуться на главную</a>
    </div>
</body>
</html>
